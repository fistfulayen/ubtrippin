name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  claude:
    # Run on @claude mentions OR auto-review on every PR push
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request_target' && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Auto-review PRs with security + correctness focus
          claude_args: >-
            --append-system-prompt "You are reviewing code for UB Trippin, a Next.js + Supabase travel app.
            Focus on: (1) RLS bypasses - never use createSecretClient() on user-facing paths,
            (2) Security - no auth/injection/data-leak risks,
            (3) Correctness - logic bugs in changed code,
            (4) Performance - N+1 queries, missing indexes, blocking SSR calls.
            Be concise. Only flag real issues with file:line. If clean, say LGTM."
