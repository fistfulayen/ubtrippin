name: Codex Auto-Fix on CI Failure

on:
  workflow_run:
    # Trigger after the main CI workflows complete
    workflows: ["E2E Tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    # Only run when CI failed on a PR branch (not main)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.head_branch != 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
      FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Check OpenAI API Key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not set. Skipping auto-fix." >&2
            exit 1
          fi

      - name: Checkout failing ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FAILED_HEAD_SHA }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Codex to fix CI failure
        uses: openai/codex-action@main
        id: codex
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are working in a Next.js + Supabase monorepo with pnpm.
            The CI workflow "${{ env.FAILED_WORKFLOW_NAME }}" failed.
            Failed run: ${{ env.FAILED_RUN_URL }}

            1. Run `pnpm run build` and `pnpm run lint` to reproduce the failure.
            2. Read the error output carefully.
            3. Identify the minimal change needed to fix the failure.
            4. Implement ONLY that fix. Do not refactor unrelated code.
            5. Run the failing command again to verify the fix works.
            6. Stop when CI passes.

            Do NOT use createSecretClient() or service role to bypass RLS.
            Keep changes small and surgical.
          codex_args: '["--config","sandbox_mode=\"workspace-write\""]'

      - name: Verify build passes
        run: pnpm run build

      - name: Verify lint passes
        run: pnpm run lint

      - name: Create pull request with fixes
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix(ci): auto-fix failing tests via Codex"
          branch: codex/auto-fix-${{ github.event.workflow_run.run_id }}
          base: ${{ env.FAILED_HEAD_BRANCH }}
          title: "fix(ci): Auto-fix failing CI on ${{ env.FAILED_HEAD_BRANCH }}"
          body: |
            🤖 **Codex Auto-Fix**

            This PR was automatically generated by Codex in response to a CI failure.

            - **Failed workflow:** `${{ env.FAILED_WORKFLOW_NAME }}`
            - **Failed run:** ${{ env.FAILED_RUN_URL }}
            - **Branch:** `${{ env.FAILED_HEAD_BRANCH }}`

            This PR contains minimal changes intended solely to make CI pass.
            Please review before merging.
